<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dotnine Survey</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

<header>
    <div class="logo">
        <img src="assets/logo.png" alt="Dotnine Logo">
        <h1>Dotnine Survey</h1>
    </div>
    <nav>
        <a href="#">Home</a>
        <a href="#features">Features</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Share Your Opinion. Earn Rewards.</h2>
    <p>Complete simple surveys and earn points instantly.</p>
    <button onclick="startSurvey()">Start Survey</button>
</section>

<section id="features" class="features">
    <div class="card">
        <h3>Quick Surveys</h3>
        <p>Short and easy surveys anytime.</p>
    </div>
    <div class="card">
        <h3>Earn Points</h3>
        <p>Get rewarded for every response.</p>
    </div>
    <div class="card">
        <h3>Secure</h3>
        <p>Your data is safe with us.</p>
    </div>
</section>

<footer id="contact">
    <p>© 2026 Dotnine Survey</p>
</footer>

<script src="scripts/script.js"></script>
</body>
</html>
